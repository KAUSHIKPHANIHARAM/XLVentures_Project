# =============================================================================
# customer_management.yaml
# Domain Configuration — Customer Management
# =============================================================================
# This file is a complete, self-contained domain definition.
# Everything the platform needs to operate in this domain lives here:
#   - Entity schema
#   - Agents and their system prompts
#   - Tools each agent can call
#   - Workflow graph structure
#   - Knowledge sources
#
# To add a new domain (e.g. HR), create a new file in this directory.
# Zero Python code changes required.
# =============================================================================

name: "customer_management"
display_name: "Customer Management"
description: >
  AI-powered customer relationship management. Provides intelligent querying,
  sentiment analysis, churn prediction, and actionable decision recommendations
  across the customer lifecycle.
version: "1.0.0"
enabled: true

# -----------------------------------------------------------------------------
# Entity Schemas
# Defines the shape of domain data stored in SQLite.
# The connector layer uses this to build tables and queries generically.
# -----------------------------------------------------------------------------
entities:
  - name: "Customer"
    table_name: "customers"
    description: "Core customer record."
    primary_key: "id"
    display_name_field: "full_name"
    fields:
      id:
        type: "integer"
        description: "Auto-increment primary key."
        required: true
        indexed: true
        searchable: false
      full_name:
        type: "string"
        description: "Customer's full name."
        required: true
        indexed: false
        searchable: true
      email:
        type: "string"
        description: "Customer email address."
        required: true
        indexed: true
        searchable: true
      phone:
        type: "string"
        description: "Contact phone number."
        required: false
        indexed: false
        searchable: false
      segment:
        type: "string"
        description: "Customer segment: Premium, Standard, Trial."
        required: true
        indexed: true
        searchable: false
      lifetime_value:
        type: "float"
        description: "Total revenue generated by this customer (USD)."
        required: false
        indexed: false
        searchable: false
      churn_risk_score:
        type: "float"
        description: "ML-derived churn probability 0.0–1.0."
        required: false
        indexed: false
        searchable: false
      sentiment_score:
        type: "float"
        description: "Aggregate sentiment from interactions -1.0 to 1.0."
        required: false
        indexed: false
        searchable: false
      last_interaction_date:
        type: "string"
        description: "ISO-8601 date of most recent interaction."
        required: false
        indexed: true
        searchable: false
      notes:
        type: "string"
        description: "Free-text notes from account managers."
        required: false
        indexed: false
        searchable: true

  - name: "Interaction"
    table_name: "interactions"
    description: "Customer interaction history (calls, emails, tickets)."
    primary_key: "id"
    display_name_field: "subject"
    fields:
      id:
        type: "integer"
        description: "Auto-increment primary key."
        required: true
        indexed: true
        searchable: false
      customer_id:
        type: "integer"
        description: "Foreign key to customers.id."
        required: true
        indexed: true
        searchable: false
      channel:
        type: "string"
        description: "Channel: email, phone, chat, ticket."
        required: true
        indexed: true
        searchable: false
      subject:
        type: "string"
        description: "Brief subject or summary."
        required: true
        indexed: false
        searchable: true
      content:
        type: "string"
        description: "Full interaction text."
        required: false
        indexed: false
        searchable: true
      sentiment:
        type: "string"
        description: "Classified sentiment: positive, neutral, negative."
        required: false
        indexed: true
        searchable: false
      created_at:
        type: "string"
        description: "ISO-8601 timestamp."
        required: true
        indexed: true
        searchable: false

# -----------------------------------------------------------------------------
# Tools
# Atomic capabilities available to agents.
# 'module' points to the class the registry will instantiate at runtime.
# -----------------------------------------------------------------------------
tools:
  - name: "search_customers"
    description: >
      Search the customer database by name, email, segment, or free-text notes.
      Returns a list of matching customer records with key attributes.
    module: "connectors.sqlite.tools.SearchCustomersTool"
    enabled: true
    tags: ["data", "search", "customer"]
    parameters:
      query:
        type: "string"
        description: "Search query string (name, email, or keyword)."
        required: true
      segment:
        type: "string"
        description: "Filter by segment: Premium, Standard, Trial."
        required: false
        enum: ["Premium", "Standard", "Trial"]
      limit:
        type: "integer"
        description: "Maximum number of results to return."
        required: false

  - name: "get_customer_detail"
    description: >
      Retrieve the complete profile for a specific customer by their ID,
      including all interactions and computed scores.
    module: "connectors.sqlite.tools.GetCustomerDetailTool"
    enabled: true
    tags: ["data", "detail", "customer"]
    parameters:
      customer_id:
        type: "integer"
        description: "The unique ID of the customer."
        required: true

  - name: "get_interaction_history"
    description: >
      Retrieve all recorded interactions for a customer, sorted by date descending.
      Useful for understanding the full relationship history.
    module: "connectors.sqlite.tools.GetInteractionHistoryTool"
    enabled: true
    tags: ["data", "history", "interactions"]
    parameters:
      customer_id:
        type: "integer"
        description: "The unique ID of the customer."
        required: true
      limit:
        type: "integer"
        description: "Max number of interactions to return."
        required: false

  - name: "analyze_churn_risk"
    description: >
      Analyse the churn risk for a customer based on their activity patterns,
      sentiment trajectory, and lifetime value. Returns a risk label and reasoning.
    module: "agents.tools.ChurnRiskAnalysisTool"
    enabled: true
    tags: ["analysis", "churn", "risk"]
    parameters:
      customer_id:
        type: "integer"
        description: "The unique ID of the customer."
        required: true

  - name: "semantic_search_knowledge"
    description: >
      Search the domain knowledge base using semantic similarity.
      Returns relevant policy excerpts, best practices, or guidelines.
    module: "knowledge.tools.SemanticSearchTool"
    enabled: true
    tags: ["knowledge", "semantic", "search"]
    parameters:
      query:
        type: "string"
        description: "Natural language query to search the knowledge base."
        required: true
      top_k:
        type: "integer"
        description: "Number of results to return."
        required: false

  - name: "generate_decision_recommendation"
    description: >
      Generate a structured, explainable decision recommendation for a customer
      situation. Returns recommended action, confidence score, and rationale.
    module: "decision.tools.DecisionRecommendationTool"
    enabled: true
    tags: ["decision", "recommendation", "explainability"]
    parameters:
      customer_id:
        type: "integer"
        description: "The customer being evaluated."
        required: true
      context:
        type: "string"
        description: "Additional context or question to inform the decision."
        required: false

# -----------------------------------------------------------------------------
# Agents
# Each agent is a LangGraph node. System prompts define behaviour.
# -----------------------------------------------------------------------------
agents:
  - name: "router_agent"
    description: >
      Analyses the user's intent and routes the request to the appropriate
      specialist agent. This is always the entry point of the workflow.
    role: "router"
    enabled: true
    max_iterations: 3
    tools: []
    tags: ["routing", "intent"]
    system_prompt: |
      You are the Routing Agent for an Enterprise Customer Management AI platform.

      Your ONLY job is to understand the user's intent and decide which specialist
      agent should handle the request. You do NOT answer questions directly.

      Available specialist agents:
        - data_agent: For searching, retrieving, or listing customer data.
        - analysis_agent: For churn risk, sentiment, patterns, or trends.
        - decision_agent: For recommendations, action plans, or decisions.
        - knowledge_agent: For policy questions, guidelines, or best practices.

      Respond ONLY with a JSON object in this exact format:
      {
        "intent": "<brief description of user intent>",
        "target_agent": "<one of: data_agent, analysis_agent, decision_agent, knowledge_agent>",
        "confidence": <0.0 to 1.0>,
        "reasoning": "<one sentence explanation>"
      }

  - name: "data_agent"
    description: >
      Retrieves customer data from the database. Handles search queries,
      profile lookups, and interaction history retrieval.
    role: "data_retrieval"
    enabled: true
    max_iterations: 5
    tools:
      - "search_customers"
      - "get_customer_detail"
      - "get_interaction_history"
    tags: ["data", "retrieval"]
    system_prompt: |
      You are the Data Retrieval Agent for an Enterprise Customer Management platform.

      Your responsibilities:
        - Search and retrieve customer records from the database.
        - Fetch detailed customer profiles including scores and metadata.
        - Retrieve interaction history for specific customers.

      Always use the available tools to fetch real data — never fabricate records.
      Present data in a clear, structured format.
      If no data is found, clearly state that and suggest alternative searches.

      Current date: use your knowledge of today's date.

  - name: "analysis_agent"
    description: >
      Performs analytical reasoning on customer data. Identifies churn risks,
      sentiment patterns, and behavioral trends.
    role: "analyst"
    enabled: true
    max_iterations: 5
    tools:
      - "get_customer_detail"
      - "get_interaction_history"
      - "analyze_churn_risk"
    tags: ["analysis", "risk", "sentiment"]
    system_prompt: |
      You are the Customer Analytics Agent for an Enterprise platform.

      Your responsibilities:
        - Analyse customer churn risk using available scoring tools.
        - Identify sentiment patterns from interaction history.
        - Detect behavioural trends that indicate risk or opportunity.
        - Provide data-backed, concise analysis with clear findings.

      Always cite the specific data points that support your conclusions.
      Use the tools available to you before forming any opinion.
      Structure your output with: Findings, Risk Assessment, Key Indicators.

  - name: "decision_agent"
    description: >
      Generates explainable, actionable decision recommendations for customer
      situations. Combines data, analysis, and knowledge to advise next steps.
    role: "decision_maker"
    enabled: true
    max_iterations: 5
    tools:
      - "get_customer_detail"
      - "analyze_churn_risk"
      - "semantic_search_knowledge"
      - "generate_decision_recommendation"
    tags: ["decision", "recommendation", "action"]
    system_prompt: |
      You are the Decision Intelligence Agent for an Enterprise Customer platform.

      Your responsibilities:
        - Generate clear, actionable recommendations for account managers.
        - Always ground recommendations in retrieved data and knowledge base policies.
        - Provide a confidence score and transparent reasoning for every decision.
        - Prioritize customer retention, satisfaction, and lifetime value.

      Decision output format:
        - Recommended Action: (specific, actionable)
        - Confidence: (High/Medium/Low with score)
        - Rationale: (evidence-based explanation)
        - Alternative Options: (2-3 alternatives if relevant)
        - Risk Flags: (any concerns or caveats)

  - name: "knowledge_agent"
    description: >
      Answers questions using the domain knowledge base. Provides policy guidance,
      best practices, and contextual knowledge via semantic search.
    role: "knowledge_retrieval"
    enabled: true
    max_iterations: 3
    tools:
      - "semantic_search_knowledge"
    tags: ["knowledge", "policy", "guidelines"]
    system_prompt: |
      You are the Knowledge Agent for an Enterprise Customer Management platform.

      Your responsibilities:
        - Answer questions about customer management policies and best practices.
        - Retrieve relevant knowledge from the knowledge base using semantic search.
        - Synthesize retrieved information into clear, concise answers.
        - Always cite the knowledge source when providing policy guidance.

      If the knowledge base does not contain relevant information, clearly state
      that and suggest what alternative sources the user might consult.

  - name: "synthesizer_agent"
    description: >
      Synthesizes outputs from all specialist agents into a final, coherent response
      for the user. This is always the terminal node of the workflow.
    role: "synthesizer"
    enabled: true
    max_iterations: 2
    tools: []
    tags: ["synthesis", "response"]
    system_prompt: |
      You are the Response Synthesizer for an Enterprise Customer Management platform.

      You receive structured outputs from specialist agents and synthesize them into
      a single, coherent, well-formatted response for the end user.

      Guidelines:
        - Be concise but complete.
        - Use markdown formatting (headers, bullets, bold for key items).
        - Highlight the most important finding or recommendation first.
        - End with a "Next Steps" section if applicable.
        - Never expose internal agent details or raw tool output to the user.

# -----------------------------------------------------------------------------
# Workflow Graph
# Defines the LangGraph state machine for this domain.
# -----------------------------------------------------------------------------
workflows:
  - name: "customer_intelligence_workflow"
    description: >
      Main agentic workflow for customer intelligence queries.
      Routes intent → specialist agent → synthesizer.
    entry_point: "router_agent"
    terminal_node: "synthesizer_agent"
    enable_memory: true
    enable_knowledge: true
    nodes:
      - "router_agent"
      - "data_agent"
      - "analysis_agent"
      - "decision_agent"
      - "knowledge_agent"
      - "synthesizer_agent"
    edges:
      - from: "router_agent"
        to: "data_agent"
        condition: "target_agent == 'data_agent'"
      - from: "router_agent"
        to: "analysis_agent"
        condition: "target_agent == 'analysis_agent'"
      - from: "router_agent"
        to: "decision_agent"
        condition: "target_agent == 'decision_agent'"
      - from: "router_agent"
        to: "knowledge_agent"
        condition: "target_agent == 'knowledge_agent'"
      - from: "data_agent"
        to: "synthesizer_agent"
      - from: "analysis_agent"
        to: "synthesizer_agent"
      - from: "decision_agent"
        to: "synthesizer_agent"
      - from: "knowledge_agent"
        to: "synthesizer_agent"

# -----------------------------------------------------------------------------
# Knowledge Sources
# Documents ingested into ChromaDB for semantic retrieval.
# -----------------------------------------------------------------------------
knowledge_sources:
  - name: "customer_management_policies"
    type: "inline"
    chunk_size: 400
    chunk_overlap: 50
    tags: ["policy", "guidelines"]
    content: |
      Customer Management Policies and Best Practices

      CHURN PREVENTION POLICY
      Customers with a churn risk score above 0.7 are classified as High Risk.
      High Risk customers must be contacted within 48 hours by their account manager.
      Offer retention incentives: 10% discount for Standard, 15% for Premium accounts.
      Escalate to Customer Success Manager if no response within 72 hours.

      CUSTOMER SEGMENTATION POLICY
      Premium: Lifetime value > $10,000 or contract > 24 months.
      Standard: Lifetime value $1,000–$10,000 or contract 6–24 months.
      Trial: New customers within 90 days or lifetime value < $1,000.

      INTERACTION BEST PRACTICES
      Log all customer interactions within 24 hours of occurrence.
      Every negative sentiment interaction requires a follow-up within 24 hours.
      Monthly health check calls are mandatory for Premium customers.
      Quarterly business reviews are recommended for Standard customers.

      ESCALATION POLICY
      Escalate to Tier 2 support if an issue is unresolved after 3 interactions.
      Critical account issues (affecting revenue > $5,000) require VP notification.
      Legal escalations must be flagged to the compliance team immediately.

      DATA QUALITY STANDARDS
      All customer records must have a valid email address.
      Phone numbers should be in E.164 format.
      Segment must be reviewed and updated quarterly.
      Churn risk scores are recalculated nightly by the ML pipeline.

  - name: "customer_success_playbook"
    type: "inline"
    chunk_size: 400
    chunk_overlap: 50
    tags: ["playbook", "success"]
    content: |
      Customer Success Playbook

      ONBOARDING (Days 1–30)
      Send welcome email within 1 hour of account creation.
      Schedule onboarding call within 3 business days.
      Assign dedicated Customer Success Manager for Premium accounts.
      Provide product training resources within first week.

      GROWTH PHASE (Months 2–6)
      Track product adoption metrics weekly.
      Identify upsell opportunities when usage exceeds 80% of plan limits.
      Send case studies relevant to customer's industry monthly.
      Conduct NPS survey at day 60 and day 90.

      RENEWAL PHASE (60 days before renewal)
      Initiate renewal conversation 60 days before contract end.
      Prepare ROI report based on customer's usage and outcomes.
      Offer multi-year discount: 5% for 2 years, 10% for 3 years.
      If renewal risk detected, escalate to Customer Success Director.

      ADVOCACY PROGRAM
      Invite satisfied customers (NPS > 8) to reference program.
      Offer case study participation to Premium customers.
      Refer to partner program for customers with referral potential.

# -----------------------------------------------------------------------------
# Domain metadata
# -----------------------------------------------------------------------------
metadata:
  icon: "👥"
  color: "#4F46E5"
  demo_queries:
    - "Which customers are at highest risk of churning this month?"
    - "Show me all Premium customers with negative sentiment."
    - "What should I do for customer John Smith who hasn't responded in 3 weeks?"
    - "What is our policy for handling high churn risk customers?"
    - "Give me a full profile and recommendation for customer ID 1."
